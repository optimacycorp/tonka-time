services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - default
      - tonka_internal

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tonka
      POSTGRES_USER: tonka
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  postgres_data:

networks:
  tonka_internal:
    name: tonka_internal
